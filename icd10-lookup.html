<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICD-10 Code Lookup</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-light: #eff6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    background: var(--card);
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .results {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .result-row {
    display: flex;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    align-items: baseline;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row:hover { background: var(--accent-light); }
  .code {
    font-weight: 600;
    color: var(--accent);
    font-size: 14px;
    min-width: 70px;
    font-family: "SF Mono", Menlo, monospace;
  }
  .name {
    font-size: 14px;
    color: var(--text);
  }
  .status {
    padding: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .count-badge {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  footer {
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <h1>ICD-10 Code Lookup</h1>
  <div class="subtitle">Search by diagnosis name or by code (e.g. "tuberculosis" or "A15").</div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Type a code or condition..." autofocus>
  </div>
  <div class="hint">Powered by the NIH/NLM Clinical Table Search Service (free, public API).</div>

  <div class="count-badge" id="countBadge"></div>
  <div class="results" id="results">
    <div class="status">Start typing to search ICD-10-CM codes.</div>
  </div>

  <footer>Data source: clinicaltables.nlm.nih.gov &middot; ICD-10-CM</footer>
</div>

<script>
const input = document.getElementById('searchInput');
const resultsEl = document.getElementById('results');
const countBadge = document.getElementById('countBadge');
let debounceTimer = null;
let currentController = null;

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function search(term) {
  if (!term.trim()) {
    resultsEl.innerHTML = '<div class="status">Start typing to search ICD-10-CM codes.</div>';
    countBadge.textContent = '';
    return;
  }

  if (currentController) currentController.abort();
  currentController = new AbortController();

  resultsEl.innerHTML = '<div class="status">Searching…</div>';

  const url = `https://clinicaltables.nlm.nih.gov/api/icd10cm/v3/search?sf=code,name&df=code,name&terms=${encodeURIComponent(term)}&maxList=25`;

  try {
    const res = await fetch(url, { signal: currentController.signal });
    if (!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    const total = data[0];
    const displayRows = data[3] || [];

    if (displayRows.length === 0) {
      resultsEl.innerHTML = '<div class="status">No matching codes found.</div>';
      countBadge.textContent = '';
      return;
    }

    countBadge.textContent = `${total} match${total === 1 ? '' : 'es'} found` + (displayRows.length < total ? ` (showing first ${displayRows.length})` : '');

    resultsEl.innerHTML = displayRows.map(row => {
      const [code, name] = row;
      return `<div class="result-row"><span class="code">${escapeHtml(code)}</span><span class="name">${escapeHtml(name)}</span></div>`;
    }).join('');
  } catch (err) {
    if (err.name === 'AbortError') return;
    resultsEl.innerHTML = '<div class="status">Error fetching results. Check your connection and try again.</div>';
    countBadge.textContent = '';
  }
}

input.addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  const term = e.target.value;
  debounceTimer = setTimeout(() => search(term), 300);
});
</script>
</body>
</html>
